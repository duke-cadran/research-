version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: branch-analyzer-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: branch-analyzer-api
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app

  ui:
    image: nginx:alpine
    container_name: branch-analyzer-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  mongo_data:
